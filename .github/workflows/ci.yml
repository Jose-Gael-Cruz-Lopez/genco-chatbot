name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core tests (no ML deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install core dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        working-directory: backend
        # The retrieval (no Supabase keys) and DeepEval (no deepeval dep) tests self-skip here.
        run: pytest -q

  faithfulness-gate:
    name: DeepEval faithfulness gate
    runs-on: ubuntu-latest
    needs: core-tests
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPEVAL_JUDGE_MODEL: gpt-4.1-mini
      # Keep DeepEval fully local — no Confident AI telemetry / login prompts in CI.
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
    steps:
      - uses: actions/checkout@v4

      - name: Check for judge key
        id: guard
        # Forked-PR runs (and repos without the secret set) have no OPENAI_API_KEY — skip the
        # gate gracefully rather than fail. The heavy ML install only happens when the key exists.
        run: |
          if [ -n "${OPENAI_API_KEY}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Faithfulness gate skipped::OPENAI_API_KEY secret is not set; skipping the DeepEval faithfulness gate."
          fi

      - name: Set up Python 3.12
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-ml.txt

      - name: Install core + ML dependencies
        if: steps.guard.outputs.run == 'true'
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ml.txt

      - name: Run DeepEval faithfulness gate
        if: steps.guard.outputs.run == 'true'
        working-directory: backend
        # Fails the build if any grounded case scores below the metric threshold (0.7).
        run: pytest tests/test_faithfulness_eval.py -v
